name: Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "landing/**"
      - "docs/img/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy PWA to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Seite zusammenbauen (Landing an der Wurzel, App unter /app/)
        run: |
          mkdir -p _site/app _site/img
          cp -r landing/. _site/
          cp -r src/. _site/app/
          cp -r docs/img/. _site/img/
      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
