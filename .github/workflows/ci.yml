name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend-Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: JavaScript-Syntax prüfen
        run: |
          node --check src/app.js
          node --check scripts/serve.js
      - name: JSON-Konfigurationen validieren
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('src-tauri/capabilities/default.json','utf8'))"

  rust:
    name: Rust-Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt prüfen
        working-directory: src-tauri
        run: cargo fmt --all --check
